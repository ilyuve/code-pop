version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: codepop-postgres
    environment:
      POSTGRES_DB: codepop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codepop123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - codepop-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: codepop-backend:latest
    container_name: codepop-backend
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-codepop123}@postgres:5432/codepop
      REPOS_DIR: /app/repos
      API_HOST: 0.0.0.0
      API_PORT: 8080
      LOG_LEVEL: INFO
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    volumes:
      - ./repos:/app/repos
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - codepop-network

  web:
    build:
      context: ./packages/web
      dockerfile: Dockerfile
    image: codepop-web:latest
    container_name: codepop-web
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - codepop-network

volumes:
  pgdata:

networks:
  codepop-network:
    driver: bridge
