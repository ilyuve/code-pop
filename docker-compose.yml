version: '3.8'

services:
  postgres:
    # Mirrored from pgvector/pgvector:pg16 so all images come from GHCR.
    image: ghcr.io/ilyuve/codepop-postgres:pg16
    container_name: codepop-postgres
    environment:
      POSTGRES_DB: codepop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codepop123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - codepop-network

  backend:
    # Pre-built image for "docker compose up" without local build.
    image: ghcr.io/ilyuve/codepop-backend:latest
    # Uncomment to build locally instead of pulling the pre-built image.
    # build:
    #   context: ./backend
    #   dockerfile: Dockerfile
    container_name: codepop-backend
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-codepop123}@postgres:5432/codepop
      REPOS_DIR: /app/repos
      API_HOST: 0.0.0.0
      API_PORT: 8080
      LOG_LEVEL: INFO
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-16}
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
    volumes:
      - ./repos:/app/repos
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - codepop-network

  web:
    # Pre-built image for "docker compose up" without local build.
    image: ghcr.io/ilyuve/codepop-web:latest
    # Uncomment to build locally instead of pulling the pre-built image.
    # build:
    #   context: ./packages/web
    #   dockerfile: Dockerfile
    container_name: codepop-web
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - codepop-network

volumes:
  pgdata:
  hf_cache:

networks:
  codepop-network:
    driver: bridge