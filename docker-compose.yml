version: '3.8'

services:
  postgres:
    image: ankane/pgvector:pg16
    container_name: codepop-postgres
    environment:
      POSTGRES_DB: codepop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codepop123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - codepop-network

  codepop:
    image: codepop/codepop:latest
    container_name: codepop-server
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-codepop123}@postgres:5432/codepop
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODEPOP_HOST: 0.0.0.0
      CODEPOP_PORT: 8080
      CODEPOP_MCP_PORT: 8081
    volumes:
      - ./repos:/app/repos
      - ./logs:/app/logs
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - codepop-network

  web:
    image: codepop/web:latest
    container_name: codepop-web
    environment:
      API_URL: http://codepop:8080
    ports:
      - "3000:3000"
    depends_on:
      - codepop
    networks:
      - codepop-network

volumes:
  pgdata:

networks:
  codepop-network:
    driver: bridge