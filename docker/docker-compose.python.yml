version: '3.8'

services:
  # PostgreSQL with pgvector
  postgres:
    image: ankane/pgvector:pg16
    container_name: codepop-postgres
    environment:
      POSTGRES_DB: codepop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codepop123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Python FastAPI Backend
  codepop:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: codepop-server
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-codepop123}@postgres:5432/codepop
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODEPOP_PORT: 3000
      CODEPOP_MCP_PORT: 3001
    volumes:
      - ./backend:/app
      - ./repos:/app/repos
      - ./logs:/app/logs
    ports:
      - "3000:3000"
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  # React Web UI
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: codepop-web
    ports:
      - "80:80"
    depends_on:
      - codepop

volumes:
  pgdata:
